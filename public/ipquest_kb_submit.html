<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IPQuest – Submit Ticket</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 40px;
    }
    .container {
      max-width: 900px;
      background: #ffffff;
      padding: 30px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h2, h3 {
      margin-top: 0;
    }
    pre {
      background: #f0f0f0;
      padding: 15px;
      overflow-x: auto;
      border-radius: 4px;
      max-height: 300px;
    }
    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 10px;
    }
    .status {
      margin-top: 20px;
      font-weight: bold;
    }
    .error {
      color: #b00020;
    }
    .success {
      color: #006400;
    }
    .search-box {
      margin-bottom: 25px;
      padding: 15px;
      background: #eef2f6;
      border-radius: 4px;
    }
    .search-results {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>IPQuest Ticket Submission</h2>

    <div class="search-box">
      <h3>KB Search</h3>
      <button onclick="searchCompany()">Search Company</button>
      <button onclick="searchIssue()">Search Issue</button>
      <button onclick="searchSolution()">Search Solution</button>

      <input
        type="text"
        id="searchInput"
        placeholder="Edit search text"
        style="padding:8px; width:300px; margin-top:10px;"
      />

      <pre id="searchResults" class="search-results">No search performed.</pre>
    </div>

    <p>Review the ticket details below, then click <strong>Submit Ticket</strong>.</p>

    <pre id="preview">Loading...</pre>

    <button onclick="sendWebhook()">Submit Ticket</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const submitWebhookUrl =
      "https://hook.us2.make.com/f8bd2nrlmfyhwcfk2brxrovop83syqo2";

    const searchWebhookUrl =
      "https://hook.us2.make.com/f48giopi2nt97ulsaded7ld14i7gy3bk";

    let payload = null;

    function base64UrlDecode(str) {
      str = str.replace(/-/g, "+").replace(/_/g, "/");
      return atob(str);
    }

    function loadPayloadFromLink() {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get("data");

      if (!encoded) {
        throw new Error("No data parameter found in the link.");
      }

      const decoded = base64UrlDecode(encoded);
      const json = JSON.parse(decoded);

      json.timestamp = new Date().toISOString();
      return json;
    }

    function getSearchText(fallback) {
      const manual = document.getElementById("searchInput").value.trim();
      return manual || fallback;
    }

    function init() {
      try {
        payload = loadPayloadFromLink();
        document.getElementById("preview").textContent =
          JSON.stringify(payload, null, 2);

        if (payload?.Company) {
          document.getElementById("searchInput").value = payload.Company;
        }

        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode");
        if (mode === "search" && payload?.Company) {
          performSearch("company", payload.Company);
        }

      } catch (err) {
        document.getElementById("preview").textContent = "";
        document.getElementById("status").textContent = err.message;
        document.getElementById("status").className = "status error";
      }
    }

    async function sendWebhook() {
      if (!payload) return;

      document.getElementById("status").textContent = "Submitting ticket...";
      document.getElementById("status").className = "status";

      try {
        const response = await fetch(submitWebhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error("HTTP error " + response.status);
        }

        document.getElementById("status").textContent =
          "Ticket submitted successfully!";
        document.getElementById("status").className = "status success";

      } catch (err) {
        document.getElementById("status").textContent =
          "Submission failed: " + err.message;
        document.getElementById("status").className = "status error";
      }
    }

    async function performSearch(type, keywords) {
      document.getElementById("searchResults").textContent =
        "Searching...";

      try {
        const response = await fetch(searchWebhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            search_type: type,
            keywords: keywords
          })
        });

        if (!response.ok) {
          throw new Error("HTTP error " + response.status);
        }

        const text = await response.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          document.getElementById("searchResults").textContent =
            text || "No records returned from Airtable. Please confirm the connection or filters.";
          return;
        }

        if (Array.isArray(data) && data.length === 0) {
          document.getElementById("searchResults").textContent =
            "No records returned from Airtable. Please confirm the connection or filters.";
          return;
        }

        if (!data || (typeof data === "object" && !Array.isArray(data) && Object.keys(data).length === 0)) {
          document.getElementById("searchResults").textContent =
            "No records returned from Airtable. Please confirm the connection or filters.";
          return;
        }

        document.getElementById("searchResults").textContent =
          JSON.stringify(data, null, 2);

      } catch (err) {
        document.getElementById("searchResults").textContent =
          "Search failed: " + err.message;
      }
    }

    function searchCompany() {
      const text = getSearchText(payload?.Company);
      if (!text) {
        document.getElementById("searchResults").textContent =
          "No company name available for search.";
        return;
      }
      performSearch("company", text);
    }

    function searchIssue() {
      const fallback = payload?.Problem_Description || payload?.Problem_Title;
      const text = getSearchText(fallback);
      if (!text) {
        document.getElementById("searchResults").textContent =
          "No issue text available for search.";
        return;
      }
      performSearch("issue", text);
    }

    function searchSolution() {
      const fallback = payload?.Root_Cause || payload?.Solution_Steps;
      const text = getSearchText(fallback);
      if (!text) {
        document.getElementById("searchResults").textContent =
          "No solution text available for search.";
        return;
      }
      performSearch("solution", text);
    }

    init();
  </script>
</body>
</html>
